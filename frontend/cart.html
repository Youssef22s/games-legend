<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Cart - Games Legend 🎮</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-light modern-body">
    
    <nav class="navbar navbar-expand-lg navbar-dark glass-navbar sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
          <i class="bi bi-controller fs-4 text-primary"></i>
          <span>Games Legend</span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center" id="nav-links">
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-5 py-4 mb-5">
      
      <div class="d-flex align-items-center mb-5">
        <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex justify-content-center align-items-center me-3 shadow-sm" style="width: 60px; height: 60px;">
            <i class="fa-solid fa-cart-shopping text-white fs-3"></i>
        </div>
        <div>
            <h2 class="fw-bold text-dark mb-1">Shopping Cart</h2>
            <p class="text-muted mb-0">Review your selected games before checkout.</p>
        </div>
      </div>

      <div class="row g-4">
        
        <div class="col-lg-8">
          <div class="card shadow-sm border-0 rounded-4 h-100">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
                <h5 class="fw-bold mb-0 text-dark"><i class="bi bi-bag-check me-2 text-primary"></i>Your Items</h5>
            </div>
            <div class="card-body p-4">
              <div class="table-responsive">
                <table class="table table-hover align-middle border-top mt-2">
                  <thead class="table-light">
                    <tr>
                      <th class="text-muted fw-semibold py-3 border-0 rounded-start">Product</th>
                      <th class="text-muted fw-semibold py-3 border-0">Price</th>
                      <th class="text-muted fw-semibold py-3 border-0">Qty</th>
                      <th class="text-muted fw-semibold py-3 border-0 rounded-end text-end">Action</th>
                    </tr>
                  </thead>
                  <tbody id="cart-items-list" class="border-top-0">
                      </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card shadow-sm border-0 rounded-4 sticky-top" style="top: 100px; z-index: 1;">
            <div class="card-body p-4">
              <h5 class="fw-bold mb-4 text-dark">Order Summary</h5>
              
              <div class="d-flex justify-content-between align-items-center mb-3">
                  <span class="text-muted fw-medium">Subtotal</span>
                  <span class="fw-bold text-dark fs-5">$<span id="cart-total">0.00</span></span>
              </div>
              
              <hr class="text-muted opacity-25 my-4">
              
              <div class="d-flex justify-content-between align-items-center mb-4">
                  <span class="fw-bold fs-5 text-dark">Total</span>
                  <h3 class="fw-bold text-primary mb-0">$<span id="cart-total-final">0.00</span></h3>
              </div>
              
              <a id="checkout-btn" class="btn btn-primary w-100 rounded-pill py-3 fw-medium shadow-sm transition d-flex justify-content-center align-items-center gap-2 mb-3">
                Proceed to Checkout <i class="bi bi-arrow-right"></i>
              </a>
              
              <div class="text-center">
                  <a href="index.html" class="text-muted text-decoration-none small transition">
                      <i class="bi bi-arrow-left me-1"></i> Continue Shopping
                  </a>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/5f3b6847bd.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/cart.js"></script>
  </body>
</html>
