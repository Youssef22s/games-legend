<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Games Legend</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-light modern-body">
    
    <nav class="navbar navbar-expand-lg navbar-dark glass-navbar sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
          <i class="bi bi-controller fs-4 text-primary"></i>
          <span>Games Legend</span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
            <li class="nav-item"><a class="nav-link text-light" href="login.html">Sign in</a></li>
            </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-5 py-5">
      <div id="alert-box"></div>
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
              
              <div class="text-center mb-4">
                <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex justify-content-center align-items-center mb-3" style="width: 64px; height: 64px;">
                  <i class="bi bi-person-plus-fill text-white fs-3"></i>
                </div>
                <h2 class="fw-bold text-dark">Create an Account</h2>
                <p class="text-muted">Join the ultimate gaming marketplace</p>
              </div>

              <form id="registerForm">
                <div class="form-floating mb-3">
                  <input type="text" class="form-control rounded-3" id="username" placeholder="Username" required />
                  <label for="username">Username</label>
                </div>
                <div class="form-floating mb-3">
                  <input type="email" class="form-control rounded-3" id="email" placeholder="name@example.com" required />
                  <label for="email">Email address</label>
                </div>
                <div class="form-floating mb-4">
                  <input type="password" class="form-control rounded-3" id="password" placeholder="Password" required />
                  <label for="password">Password</label>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm rounded-pill py-2 fw-medium">
                  Sign Up
                </button>
              </form>
              
              <div class="text-center mt-4">
                <p class="text-muted mb-0">
                  Already have an account?
                  <a href="login.html" class="text-decoration-none fw-semibold text-primary">Sign in</a>
                </p>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://kit.fontawesome.com/5f3b6847bd.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
