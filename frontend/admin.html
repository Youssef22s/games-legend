<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Games Legend</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light modern-body">

    <nav class="navbar navbar-expand-lg navbar-dark glass-navbar sticky-top">
      <div class="container">
        <div class="navbar-brand fw-bold d-flex align-items-center gap-2">
          <i class="bi bi-shield-lock text-primary fs-4"></i>
          <span>Admin Panel</span>
        </div>
        <div class="d-flex align-items-center">
            <a href="index.html" class="text-decoration-none text-light me-3 d-none d-md-inline small fw-medium">Home</a>
            <button class="btn btn-outline-light btn-sm rounded-pill px-3" onclick="logout()">
                <i class="bi bi-box-arrow-right me-1"></i> Sign out
            </button>
        </div>
      </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark mb-0">Dashboard Overview</h2>
                <p class="text-muted mb-0">Manage your vendors, users, and platform statistics.</p>
            </div>
        </div>

        <div id="alert-box"></div>

        <div class="row g-4 mb-5">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm rounded-4 h-100 product-card">
                    <div class="card-body p-4 d-flex align-items-center">
                        <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex justify-content-center align-items-center me-4" style="width: 60px; height: 60px;">
                            <i class="bi bi-people-fill fs-3"></i>
                        </div>
                        <div>
                            <h6 class="text-muted fw-semibold mb-1 text-uppercase letter-spacing">Total Users</h6>
                            <h2 id="users-count" class="fw-bold text-dark mb-0 display-6">0</h2>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card border-0 shadow-sm rounded-4 h-100 product-card">
                    <div class="card-body p-4 d-flex align-items-center">
                        <div class="bg-success bg-opacity-10 text-success rounded-circle d-flex justify-content-center align-items-center me-4" style="width: 60px; height: 60px;">
                            <i class="bi bi-controller fs-3"></i>
                        </div>
                        <div>
                            <h6 class="text-muted fw-semibold mb-1 text-uppercase letter-spacing">Total Products</h6>
                            <h2 id="products-count" class="fw-bold text-dark mb-0 display-6">0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
                        <h5 class="fw-bold mb-0"><i class="bi bi-person-plus text-primary me-2"></i>Add Vendor</h5>
                    </div>
                    <div class="card-body p-4">
                        <form id="addVendorForm">
                            <div class="form-floating mb-3">
                                <input type="text" id="v-username" class="form-control rounded-3" placeholder="Vendor Name" required>
                                <label for="v-username">Vendor Name</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="email" id="v-email" class="form-control rounded-3" placeholder="name@example.com" required>
                                <label for="v-email">Email address</label>
                            </div>
                            <div class="form-floating mb-4">
                                <input type="password" id="v-password" class="form-control rounded-3" placeholder="Password" required>
                                <label for="v-password">Password</label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-medium shadow-sm">
                                Create Vendor
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
                        <h5 class="fw-bold mb-0"><i class="bi bi-shop text-primary me-2"></i>Vendors Directory</h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle border-top">
                                <thead class="table-light">
                                    <tr>
                                        <th class="text-muted fw-semibold py-3 border-0 rounded-start">ID</th>
                                        <th class="text-muted fw-semibold py-3 border-0">Name</th>
                                        <th class="text-muted fw-semibold py-3 border-0">Email</th>
                                        <th class="text-muted fw-semibold py-3 border-0 rounded-end text-end">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="vendors-list" class="border-top-0">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/admin.js"></script>
</body>
</html>
