<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Games Legend | Home</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-light modern-body">
    <nav class="navbar navbar-expand-lg navbar-dark glass-navbar sticky-top">
      <div class="container">
        <a
          class="navbar-brand fw-bold d-flex align-items-center gap-2"
          href="index.html"
        >
          <i class="bi bi-controller fs-4 text-primary"></i>
          <span>Games Legend</span>
        </a>
        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul
            class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center"
            id="nav-links"
          ></ul>
        </div>
      </div>
    </nav>

    <div class="hero-section py-5 mb-5 shadow-sm">
      <div class="container mt-4 mb-4">
        <div id="alert-box"></div>
        <div class="row justify-content-center text-center">
          <div class="col-lg-8 py-5">
            <span
              class="badge bg-primary bg-opacity-10 text-white rounded-pill px-3 py-2 mb-3 fw-semibold"
            >
            <i class="fa-solid fa-gamepad me-1"></i> The Ultimate
              Gaming Hub
            </span>
            <h1 class="display-4 fw-bold text-dark mb-3 hero-title">
              Welcome to Games Legend
            </h1>
            <p class="lead text-muted mb-5 px-md-5">
              Discover, buy, sell, and trade your favorite digital adventures in
              a seamless, modern marketplace.
            </p>

            <div
              id="hero-buttons"
              class="d-flex justify-content-center gap-3 flex-wrap"
            ></div>
          </div>
        </div>
      </div>
    </div>

    <div
      id="products-section"
      class="container mt-5 mb-5"
      style="scroll-margin-top: 100px"
    >
      <div class="text-center mb-5">
        <h2 class="fw-bold section-title">Latest Arrivals</h2>
        <p class="text-muted">Explore handpicked games from our top vendors</p>
      </div>

      <div class="row g-4" id="public-products-list">
        <div class="col-12 text-center py-5">
          <div
            class="spinner-border text-primary"
            role="status"
            style="width: 3rem; height: 3rem"
          >
            <span class="visually-hidden">Loading...</span>
          </div>
          <p class="text-muted mt-3 fw-medium">Loading amazing games...</p>
        </div>
      </div>
    </div>
    <script
      src="https://kit.fontawesome.com/5f3b6847bd.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
