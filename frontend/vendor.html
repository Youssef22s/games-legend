<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vendor Dashboard - Games Legend</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-light modern-body">
    <nav class="navbar navbar-expand-lg navbar-dark glass-navbar sticky-top">
      <div class="container">
        <div class="navbar-brand fw-bold d-flex align-items-center gap-2">
          <i class="bi bi-shop text-primary fs-4"></i>
          <span>Vendor Hub</span>
        </div>
        <div class="d-flex align-items-center">
          <a
            href="index.html"
            class="text-light text-decoration-none me-3 d-inline small fw-medium"
            >Home</a
          >
          <button class="Btn" onclick="logout()">
            <div class="sign">
              <svg viewBox="0 0 512 512">
                <path
                  d="M377.9 105.9L500.7 228.7c7.2 7.2 11.3 17.1 11.3 27.3s-4.1 20.1-11.3 27.3L377.9 406.1c-6.4 6.4-15 9.9-24 9.9c-18.7 0-33.9-15.2-33.9-33.9l0-62.1-128 0c-17.7 0-32-14.3-32-32l0-64c0-17.7 14.3-32 32-32l128 0 0-62.1c0-18.7 15.2-33.9 33.9-33.9c9 0 17.6 3.6 24 9.9zM160 96L96 96c-17.7 0-32 14.3-32 32l0 256c0 17.7 14.3 32 32 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-64 0c-53 0-96-43-96-96L0 128C0 75 43 32 96 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32z"
                ></path>
              </svg>
            </div>
            <div class="text">Logout</div>
          </button>
        </div>
      </div>
    </nav>

    <div class="container mt-5 mb-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div id>
          <h2 class="fw-bold text-dark mb-1">
            My Storefront
            <span id="vendor-name" class="text-primary">Vendor</span>
          </h2>
          <p class="text-muted mb-0">
            Manage your game listings and product details.
          </p>
        </div>
      </div>

      <div id="alert-box"></div>

      <div class="row g-4">
        <div class="col-lg-4">
          <div
            class="card border-0 shadow-sm rounded-4 sticky-top"
            style="top: 100px; z-index: 1"
          >
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
              <h5 class="fw-bold mb-0" id="form-title">
                <i class="bi bi-plus-circle-fill text-primary me-2"></i>Add New
                Product
              </h5>
            </div>
            <div class="card-body p-4">
              <form id="productForm">
                <input type="hidden" id="p-id" />

                <div class="form-floating mb-3">
                  <input
                    type="text"
                    id="p-title"
                    class="form-control rounded-3"
                    placeholder="Product Title"
                    required
                  />
                  <label for="p-title">Product Title</label>
                </div>

                <div class="form-floating mb-3">
                  <select
                    id="p-category"
                    class="form-select rounded-3"
                    required
                  >
                    <option value="" disabled selected>Loading...</option>
                  </select>
                  <label for="p-category">Category</label>
                </div>

                <div class="form-floating mb-3">
                  <input
                    type="number"
                    step="0.01"
                    id="p-price"
                    class="form-control rounded-3"
                    placeholder="Price"
                    required
                  />
                  <label for="p-price">Price ($)</label>
                </div>

                <div class="form-floating mb-4">
                  <textarea
                    id="p-desc"
                    class="form-control rounded-3"
                    placeholder="Description"
                    style="height: 120px"
                  ></textarea>
                  <label for="p-desc">Game Description</label>
                </div>

                <button
                  type="submit"
                  class="btn btn-primary w-100 rounded-pill py-2 fw-medium shadow-sm transition"
                  id="save-btn"
                >
                  Save Product
                </button>

                <button
                  type="button"
                  class="btn btn-light border w-100 mt-2 rounded-pill py-2 fw-medium d-none transition"
                  id="cancel-btn"
                  onclick="resetForm()"
                >
                  Cancel Edit
                </button>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card border-0 shadow-sm rounded-4 h-100">
            <div
              class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4 d-flex justify-content-between align-items-center"
            >
              <h5 class="fw-bold mb-0">
                <i class="bi bi-controller text-primary me-2"></i>My Products
              </h5>
            </div>
            <div class="card-body p-4">
              <div class="table-responsive">
                <table class="table table-hover align-middle border-top">
                  <thead class="table-light">
                    <tr>
                      <th
                        class="text-muted fw-semibold py-3 border-0 rounded-start"
                      >
                        Name
                      </th>
                      <th class="text-muted fw-semibold py-3 border-0">
                        Category
                      </th>
                      <th class="text-muted fw-semibold py-3 border-0">
                        Price
                      </th>
                      <th
                        class="text-muted fw-semibold py-3 border-0 rounded-end text-end"
                      >
                        Actions
                      </th>
                    </tr>
                  </thead>
                  <tbody id="my-products-list" class="border-top-0"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/vendor.js"></script>
  </body>
</html>
