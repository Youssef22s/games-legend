<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Order Details - Admin Panel 🎮</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-light modern-body">
    <div class="container mt-5 mb-5">
      <div
        class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3"
      >
        <div>
          <h2 class="fw-bold text-dark mb-0 d-flex align-items-center gap-2">
            <i class="bi bi-receipt text-primary"></i> Order Details
            <span id="order-id-title" class="text-primary fs-4"></span>
          </h2>
        </div>
        <a
          href="admin.html"
          class="btn btn-outline-secondary rounded-pill px-4 py-2 fw-medium transition d-flex align-items-center gap-2 shadow-sm"
        >
          <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>
      </div>

      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4 p-md-5">
          <div id="order-content">
            <div class="text-center py-5">
              <div
                class="spinner-border text-primary mb-3"
                role="status"
                style="width: 3rem; height: 3rem"
              ></div>
              <p class="text-muted fw-medium mb-0">Loading order details...</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/admin_order_details.js"></script>
  </body>
</html>
