<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - Games Legend 🎮</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-light modern-body d-flex flex-column min-vh-100">
    <nav
      class="navbar navbar-expand-lg navbar-dark glass-navbar sticky-top mb-4"
    >
      <div class="container">
        <a
          class="navbar-brand fw-bold d-flex align-items-center gap-2"
          href="index.html"
        >
          <i class="bi bi-controller fs-4 text-primary"></i>
          <span>Games Legend</span>
        </a>
        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center" id="nav-links"></ul>
        </div>
      </div>
    </nav>

    <div class="container flex-grow-1 mb-5">
      <div class="d-flex align-items-center mb-5">
        <div
          class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex justify-content-center align-items-center me-3 shadow-sm"
          style="width: 60px; height: 60px"
        >
          <i class="fa-solid fa-user fs-2 text-white"></i>
        </div>
        <div>
          <h2 class="fw-bold text-dark mb-1">My Profile</h2>
          <p class="text-muted mb-0">
            Manage your account settings and track your orders.
          </p>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card border-0 shadow-sm rounded-4 h-100">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
              <h5 class="fw-bold mb-0 text-dark">
                <i class="bi bi-person-gear me-2 text-primary"></i>Settings
              </h5>
            </div>
            <div class="card-body p-4">
              <form id="profile-form">
                <div class="mb-3">
                  <label class="form-label small fw-semibold text-muted"
                    >Email Address</label
                  >
                  <div class="input-group">
                    <span
                      class="input-group-text bg-light border-light-subtle text-muted"
                      ><i class="bi bi-envelope"></i
                    ></span>
                    <input
                      type="text"
                      id="user-email"
                      class="form-control bg-light border-light-subtle text-muted"
                      readonly
                    />
                  </div>
                </div>
                <div class="mb-4">
                  <label class="form-label small fw-semibold text-muted"
                    >Display Name</label
                  >
                  <div class="input-group">
                    <span class="input-group-text bg-white border-light-subtle"
                      ><i class="bi bi-person"></i
                    ></span>
                    <input
                      type="text"
                      id="user-name"
                      class="form-control border-light-subtle"
                      required
                      placeholder="Enter your name"
                    />
                  </div>
                </div>
                <button
                  type="submit"
                  id="save-btn"
                  class="btn btn-primary rounded-pill w-100 py-2 fw-medium shadow-sm transition d-flex justify-content-center align-items-center gap-2"
                >
                  <i class="bi bi-floppy"></i> Update Profile
                </button>
              </form>
              <div id="profile-msg" class="mt-3 text-center"></div>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card border-0 shadow-sm rounded-4 h-100">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
              <h5 class="fw-bold mb-0 text-dark">
                <i class="bi bi-clock-history me-2 text-primary"></i>Order
                History
              </h5>
            </div>
            <div class="card-body p-4">
              <div class="table-responsive">
                <table class="table table-hover align-middle border-top mt-2">
                  <thead class="table-light">
                    <tr>
                      <th
                        class="text-muted fw-semibold py-3 border-0 rounded-start"
                      >
                        Order ID
                      </th>
                      <th class="text-muted fw-semibold py-3 border-0">Date</th>
                      <th class="text-muted fw-semibold py-3 border-0">
                        Items
                      </th>
                      <th class="text-muted fw-semibold py-3 border-0">
                        Total
                      </th>
                      <th
                        class="text-muted fw-semibold py-3 border-0 rounded-end"
                      >
                        Status
                      </th>
                    </tr>
                  </thead>
                  <tbody id="orders-tbody" class="border-top-0">
                    <tr>
                      <td colspan="5" class="text-center p-4 border-0">
                        <div
                          class="spinner-border text-primary"
                          role="status"
                        ></div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script
      src="https://kit.fontawesome.com/5f3b6847bd.js"
      crossorigin="anonymous"
    ></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/profile.js"></script>
  </body>
</html>
