<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vendor Details - Admin Panel 🎮</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-light modern-body">
    <div class="container mt-5 mb-5">
      <div
        class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3"
      >
        <div>
          <h2 class="fw-bold text-dark mb-0 d-flex align-items-center gap-2">
            <i class="bi bi-shop text-primary"></i> Vendor Details
          </h2>
        </div>
        <a
          href="admin.html"
          class="btn btn-outline-secondary rounded-pill px-4 py-2 fw-medium transition d-flex align-items-center gap-2 shadow-sm"
        >
          <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>
      </div>

      <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div
          class="card-body p-4 p-md-5 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-4"
        >
          <div class="d-flex align-items-center gap-3">
            <div
              class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex justify-content-center align-items-center"
              style="width: 60px; height: 60px"
            >
              <i class="bi bi-person-badge text-white fs-3"></i>
            </div>
            <div>
              <p
                class="text-muted small fw-semibold text-uppercase mb-1"
                style="letter-spacing: 0.5px"
              >
                Vendor Information
              </p>
              <h4 class="fw-bold text-dark mb-1" id="vendor-name">
                Loading...
              </h4>
              <p class="text-muted mb-0 d-flex align-items-center gap-2">
                <i class="bi bi-envelope"></i><span id="vendor-email">...</span>
              </p>
            </div>
          </div>
          <div class="text-md-end">
            <span
              class="badge bg-primary bg-opacity-10 text-white border border-primary-subtle fs-6 px-4 py-2 rounded-pill shadow-sm"
            >
              Vendor Profile
            </span>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-12">
          <div class="card border-0 shadow-sm rounded-4 h-100">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
              <h5 class="fw-bold mb-0 text-dark">
                <i class="bi bi-box-seam text-primary me-2"></i>Vendor Products
              </h5>
            </div>
            <div class="card-body p-4">
              <div
                class="table-responsive rounded-3 border border-light-subtle"
              >
                <table class="table table-hover align-middle mb-0">
                  <thead class="table-light">
                    <tr>
                      <th
                        class="py-3 px-3 border-bottom-0 text-muted fw-semibold"
                      >
                        Title
                      </th>
                      <th
                        class="py-3 px-3 border-bottom-0 text-muted fw-semibold"
                      >
                        Description
                      </th>
                      <th
                        class="py-3 px-3 border-bottom-0 text-muted fw-semibold"
                      >
                        Price
                      </th>
                      <th
                        class="py-3 px-3 border-bottom-0 text-muted fw-semibold"
                      >
                        Category
                      </th>
                    </tr>
                  </thead>
                  <tbody id="vendor-products-list" class="border-top-0 px-3">
                    <tr>
                      <td colspan="3" class="text-center py-5">
                        <div
                          class="spinner-border text-primary"
                          role="status"
                          style="width: 2.5rem; height: 2.5rem"
                        ></div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12">
          <div class="card border-0 shadow-sm rounded-4 h-100">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
              <h5 class="fw-bold mb-0 text-dark">
                <i class="bi bi-graph-up-arrow text-success me-2"></i>Vendor
                Sales & Orders
              </h5>
            </div>
            <div class="card-body p-4">
              <div
                class="table-responsive rounded-3 border border-light-subtle"
              >
                <table class="table table-hover align-middle mb-0">
                  <thead class="table-light">
                    <tr>
                      <th
                        class="py-3 px-3 border-bottom-0 text-muted fw-semibold"
                      >
                        Order #
                      </th>
                      <th
                        class="py-3 px-3 border-bottom-0 text-muted fw-semibold"
                      >
                        Product
                      </th>
                      <th
                        class="py-3 px-3 border-bottom-0 text-muted fw-semibold"
                      >
                        Buyer
                      </th>
                      <th
                        class="py-3 px-3 border-bottom-0 text-muted fw-semibold text-center"
                      >
                        Qty
                      </th>
                      <th
                        class="py-3 px-3 border-bottom-0 text-muted fw-semibold text-end"
                      >
                        Total
                      </th>
                    </tr>
                  </thead>
                  <tbody id="vendor-orders-list" class="border-top-0 px-3">
                    <tr>
                      <td colspan="5" class="text-center py-5">
                        <div
                          class="spinner-border text-success"
                          role="status"
                          style="width: 2.5rem; height: 2.5rem"
                        ></div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/admin_vendor_details.js"></script>
  </body>
</html>
