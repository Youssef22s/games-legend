<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compare Games - Games Legend 🎮</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-light modern-body d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark glass-navbar sticky-top">
      <div class="container">
        <a
          class="navbar-brand fw-bold d-flex align-items-center gap-2"
          href="index.html"
        >
          <i class="bi bi-controller fs-4 text-primary"></i>
          <span>Games Legend</span>
        </a>
        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul
            class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center"
            id="nav-links"
          ></ul>
        </div>
      </div>
    </nav>

    <div class="container mt-5 py-4 mb-5">
      <div class="d-flex align-items-center mb-4">
        <div
          class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex justify-content-center align-items-center me-3 shadow-sm"
          style="width: 60px; height: 60px"
        >
          <i class="fa-solid fa-left-right fs-2 text-white"></i>
        </div>
        <div>
          <h2 class="fw-bold text-dark mb-1">Product Comparison</h2>
          <p class="text-muted mb-0">
            Compare features and prices to find the perfect game.
          </p>
        </div>
      </div>

      <div id="alert-box"></div>

      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4 p-md-5">
          <div class="table-responsive">
            <table
              class="table table-bordered text-center align-middle mb-0"
              id="compare-table"
            >
              <tbody id="compare-tbody">
                <tr>
                  <td class="text-center p-5 border-0">
                    <div
                      class="spinner-border text-primary"
                      role="status"
                    ></div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script
      src="https://kit.fontawesome.com/5f3b6847bd.js"
      crossorigin="anonymous"
    ></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/compare.js"></script>
  </body>
</html>
